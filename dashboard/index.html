<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Smart Waste Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Smart Waste Monitoring Dashboard</h1>

<div class="container">

<div class="card">
<h2>Bin A</h2>
<div class="bar">
<div class="fill danger"
style="width:20%">
</div>
</div>
<p>95% Full</p>
<p>OVERFLOW</p>
</div>


<div class="card">
<h2>Bin B</h2>
<div class="bar">
<div class="fill warning"
style="width:82%">
</div>
</div>
<p>82% Full</p>
<p>FULL</p>
</div>


<div class="card">
<h2>Bin C</h2>
<div class="bar">
<div class="fill warning"
style="width:90%">
</div>
</div>
<p>90% Full</p>
<p>FULL</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
